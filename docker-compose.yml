services:
  mongo:
    image: mongo:4.4
    container_name: cleanpool_mongo
    ports:
      - "8885:27017"
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cleanpool_backend
    ports:
      - "8883:8000"
    restart: always
    depends_on:
      - mongo
    environment:
      - DOMAIN=${DOMAIN}
      - MONGODB_URI=mongodb://mongo:27017/cleanpool
      - SECRET_KEY=${SECRET_KEY}
      - API_KEY=${API_KEY}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # En despliegue, debe apuntar al backend público.
        # Permite override con API_URL y cae al backend de Azure por defecto.
        - API_URL=${API_URL:-https://software2-backend-hxe7f4b9dug6dqat.eastus2-01.azurewebsites.net}
    container_name: cleanpool_frontend
    ports:
      - "8884:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
