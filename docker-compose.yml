# CleanPool — stack del servidor universitario
# 1883 MQTT | 8883 API | 8884 Web | 8885 MongoDB | 8886 Dokploy (externo)

services:
  mongo:
    image: mongo:4.4
    container_name: cleanpool_mongo
    ports:
      - "8885:27017"
    restart: always
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: cleanpool_mosquitto
    ports:
      - "1883:1883"
    restart: always
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cleanpool_backend
    ports:
      - "8883:8000"
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      - DOMAIN=${DOMAIN}
      - MONGODB_URI=mongodb://mongo:27017/cleanpool
      - MONGODB_LOGS_URI=mongodb://mongo:27017/
      - MONGODB_LOGS_DATABASE=cleanpool_logs
      - MONGODB_LOGS_COLLECTION=api_request_logs
      - SECRET_KEY=${SECRET_KEY}
      - API_KEY=${API_KEY}
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-cleanpool}
      - MQTT_PASSWORD=${API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://10.10.50.51:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-120}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=${API_URL:-http://localhost:8883}
    container_name: cleanpool_frontend
    ports:
      - "8884:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
  mosquitto_data:
  mosquitto_log:
