<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cleanpool_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>cleanpool_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading-splash" style="
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: #0A0E1A;
    color: #8899AA; font-family: system-ui, sans-serif; z-index: 9999;
  ">
    <div style="
      width: 36px; height: 36px; border: 3px solid #1E2D40;
      border-top-color: #2D9CDB; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 16px;
    "></div>
    <p style="margin: 0; font-size: 14px;">Cargando CleanPool...</p>
  </div>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('loading-splash');
      if (splash) splash.remove();
    });
    setTimeout(function () {
      var splash = document.getElementById('loading-splash');
      if (splash) {
        splash.innerHTML = '<p style="margin:0;font-size:14px;color:#F39C12;">'
          + 'La app tarda en cargar. Recarga con Ctrl+Shift+R.</p>';
      }
    }, 20000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
