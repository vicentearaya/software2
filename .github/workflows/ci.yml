name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: |
          cd backend
          pytest tests/ -q --tb=short

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Flutter pub get
        run: |
          cd frontend
          flutter pub get
      # Rive: sin esto, RiveNative.init() falla en Linux (widget_test + WelcomeScreen nativo).
      - name: Setup Rive native (Linux)
        run: |
          cd frontend
          dart run rive_native:setup --verbose --clean --platform linux
      - name: Flutter test
        run: |
          cd frontend
          flutter test
